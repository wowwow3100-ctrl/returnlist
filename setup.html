<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>防颱清單|同步設定(區店長用)</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f1f4f8; color: #1a2433;
    font-family: system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-size: 16px; line-height: 1.6;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 24px 16px 60px; }
  h1 { font-size: 20px; }
  .card { background: #fff; border: 1px solid #dde5ef; border-radius: 14px; padding: 18px; margin-top: 14px; }
  .btn {
    border: 0; border-radius: 12px; padding: 14px 22px;
    font-size: 17px; font-weight: 700; cursor: pointer; background: #0f2d52; color: #fff; width: 100%;
  }
  .btn-sm { width: auto; padding: 9px 16px; font-size: 14px; background: #059669; margin-top: 8px; }
  .link {
    background: #f4f7fb; border: 1px solid #dbe4ef; border-radius: 10px;
    padding: 10px 12px; font-size: 13.5px; word-break: break-all; margin-top: 8px;
    font-family: ui-monospace, Consolas, monospace;
  }
  .ok { color: #059669; font-weight: 700; }
  .err { color: #b02a2a; font-weight: 700; }
  .hint { font-size: 13.5px; color: #6b7a8d; }
  #result { display: none; }
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%);
    background: #1a2433; color: #fff; border-radius: 99px; padding: 10px 20px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 30;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="wrap">
  <h1>🌀 防颱清單|自動回報設定</h1>
  <div class="hint">這頁只有你(區店長)需要用,每次颱風按一次,產生這一次的專用連結。</div>

  <div class="card">
    <button class="btn" id="go" onclick="createChannel()">① 建立本次颱風的同步頻道</button>
    <div id="status" class="hint" style="margin-top:10px"></div>
  </div>

  <div class="card" id="result">
    <b>② 店長版連結(整段貼到 Teams 群組)</b>
    <div class="link" id="linkStore"></div>
    <button class="btn btn-sm" onclick="copyEl('linkStore','店長版連結已複製')">複製店長版連結</button>
    <div style="margin-top:18px"><b>③ 彙整版連結(你自己用,存到我的最愛)</b></div>
    <div class="link" id="linkAdmin"></div>
    <button class="btn btn-sm" onclick="copyEl('linkAdmin','彙整版連結已複製')">複製彙整版連結</button>
    <div class="hint" style="margin-top:14px">說明:店長用「店長版連結」打勾,約 1~2 秒自動回報;你開「彙整版連結」每 25 秒自動更新百分比。下次颱風再回來這頁重新按一次,舊資料自動歸零(連結會換新的)。</div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
var KV = "https://kvdb.io/";
var JB = "https://jsonblob.com/api/jsonBlob";
var STORES = ["師大","光華","士林","板橋","中壢","新竹","宜蘭","文心","英才","嘉義","台南","建國","左營"];

function setStatus(html) { document.getElementById("status").innerHTML = html; }

function kvCreate(body, headers) {
  return fetch(KV, { method: "POST", body: body, headers: headers || {} })
    .then(function (r) {
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.text();
    })
    .then(function (id) {
      id = (id || "").trim();
      if (!/^[A-Za-z0-9]{8,}$/.test(id)) throw new Error("格式不符");
      return fetch(KV + id + "/selftest", { method: "PUT", body: "ok" })
        .then(function (r) { if (!r.ok) throw new Error("寫入失敗"); return fetch(KV + id + "/selftest"); })
        .then(function (r) { if (!r.ok) throw new Error("讀取失敗"); return r.text(); })
        .then(function (t) {
          if (t.trim() !== "ok") throw new Error("比對失敗");
          return id;
        });
    });
}

function jbCreateOne(store) {
  return fetch(JB, {
    method: "POST",
    headers: { "Content-Type": "application/json", "Accept": "application/json" },
    body: JSON.stringify({ store: store, ts: 0 })
  }).then(function (r) {
    if (!(r.status === 200 || r.status === 201)) throw new Error("HTTP " + r.status);
    var loc = r.headers.get("Location") || r.headers.get("location") || "";
    var m = /jsonBlob\/([A-Za-z0-9-]+)/.exec(loc);
    if (m) return m[1];
    return r.json().then(function (j) {
      if (j && j.id) return String(j.id);
      throw new Error("拿不到編號");
    });
  });
}

function jbCreateAll() {
  // 依序建立 13 個(每間門市一個),避免同時打太兇
  var ids = [];
  var p = Promise.resolve();
  STORES.forEach(function (s, i) {
    p = p.then(function () {
      setStatus("🟡 建立中…(備用服務 " + (i + 1) + "/13)");
      return jbCreateOne(s).then(function (id) { ids.push(id); });
    });
  });
  return p.then(function () {
    // 自我測試:讀第一個
    return fetch(JB + "/" + ids[0]).then(function (r) {
      if (!r.ok) throw new Error("讀取測試失敗");
      return "J." + ids.join(".");
    });
  });
}

function createChannel() {
  document.getElementById("go").disabled = true;
  setStatus("🟡 建立中…(方式 1)");
  kvCreate("", {})
    .catch(function () {
      setStatus("🟡 建立中…(方式 2)");
      return kvCreate("email=fangtai-list@example.com", { "Content-Type": "application/x-www-form-urlencoded" });
    })
    .catch(function () {
      setStatus("🟡 方式 1、2 失敗,改用備用服務…");
      return jbCreateAll();
    })
    .then(function (token) { showLinks(token); })
    .catch(function (e) {
      document.getElementById("go").disabled = false;
      setStatus('<span class="err">❌ 兩家服務都建立失敗(' + (e && e.message ? e.message : "連線問題") + ')。</span><br>請把這個畫面截圖給 Claude,改用更穩的方案(例如 Firebase 或你的 Railway)。');
    });
}

function showLinks(id) {
  var base = location.href.replace(/setup\.html.*$/, "");
  document.getElementById("linkStore").textContent = base + "?b=" + id;
  document.getElementById("linkAdmin").textContent = base + "admin.html?b=" + id;
  document.getElementById("result").style.display = "block";
  setStatus('<span class="ok">✅ 頻道建立成功!請複製下面兩條連結。</span>');
}

function copyEl(elId, msg) {
  var txt = document.getElementById(elId).textContent;
  var done = function () { toast(msg); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done, function () { legacy(txt); done(); });
  } else { legacy(txt); done(); }
}
function legacy(txt) {
  var ta = document.createElement("textarea");
  ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
}
var tt;
function toast(m) {
  var t = document.getElementById("toast");
  t.textContent = m; t.classList.add("show");
  clearTimeout(tt); tt = setTimeout(function(){ t.classList.remove("show"); }, 2200);
}
</script>
</body>
</html>
