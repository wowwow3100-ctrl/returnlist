<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>防颱回報彙整|區店長</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0; background: #f1f4f8; color: #1a2433;
    font-family: system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    font-size: 15.5px; line-height: 1.5;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 14px 60px; }

  .top {
    position: sticky; top: 0; z-index: 20;
    background: #0f2d52; color: #fff;
    margin: 0 -14px; padding: 14px 18px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.18);
  }
  .top h1 { margin: 0; font-size: 18px; font-weight: 700; }
  .sum { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .pill { border-radius: 99px; padding: 4px 14px; font-size: 13.5px; font-weight: 700; background: rgba(255,255,255,.15); }
  .pill.g { background: #059669; }
  .pill.y { background: #d97706; }
  .pill.r { background: #dc2626; }
  .bar { background: rgba(255,255,255,.22); border-radius: 99px; height: 10px; margin-top: 10px; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 0; background: #34d399; border-radius: 99px; transition: width .25s; }

  .paste {
    background: #fff; border: 1px solid #dde5ef; border-radius: 14px;
    padding: 14px; margin-top: 14px;
  }
  .paste b { font-size: 15px; }
  .paste .hint { font-size: 13px; color: #6b7a8d; margin: 4px 0 8px; }
  textarea {
    width: 100%; min-height: 110px; border: 1px solid #cdd7e4; border-radius: 10px;
    padding: 10px 12px; font-size: 14px; font-family: inherit; resize: vertical; color: inherit;
  }
  textarea:focus { outline: 2px solid #2563eb; border-color: transparent; }
  .btnrow { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    border: 0; border-radius: 10px; padding: 11px 18px;
    font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-blue { background: #0f2d52; color: #fff; flex: 1; }
  .btn-green { background: #059669; color: #fff; }
  .btn-gray { background: #eef1f6; color: #7a2e2e; }

  .board { margin-top: 16px; }
  .row {
    background: #fff; border: 1px solid #e2e8f2; border-radius: 12px;
    margin-bottom: 8px; overflow: hidden; cursor: pointer;
  }
  .row-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; }
  .st-name { font-weight: 800; font-size: 16px; width: 52px; flex: none; }
  .chip {
    flex: none; border-radius: 8px; padding: 3px 10px; font-size: 13px; font-weight: 700; color: #fff;
  }
  .chip.g { background: #059669; }
  .chip.y { background: #d97706; }
  .chip.r { background: #dc2626; }
  .mini { flex: 1; background: #edf1f7; border-radius: 99px; height: 8px; overflow: hidden; min-width: 60px; }
  .mini i { display: block; height: 100%; border-radius: 99px; }
  .meta { flex: none; font-size: 12.5px; color: #6b7a8d; text-align: right; line-height: 1.3; }
  .det { display: none; border-top: 1px dashed #e2e8f2; padding: 10px 14px; background: #fbfcfe; font-size: 13.5px; }
  .row.open .det { display: block; }
  .det .ud { color: #b45309; margin: 2px 0; }
  .det .ok { color: #059669; margin: 2px 0; }

  .unknown {
    background: #fff4f4; border: 1px solid #eec7c7; border-radius: 12px;
    padding: 10px 14px; margin-top: 10px; font-size: 13.5px; color: #8a2c2c;
  }

  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: #1a2433; color: #fff; border-radius: 99px; padding: 10px 20px;
    font-size: 14px; opacity: 0; pointer-events: none; transition: all .25s; z-index: 30;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .note { font-size: 12.5px; color: #77879c; text-align: center; margin-top: 14px; }
</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <h1>🌀 防颱回報彙整(13 間皇家)</h1>
    <div class="sum">
      <span class="pill g" id="pG">✅ 完成 0</span>
      <span class="pill y" id="pY">⏳ 進行中 0</span>
      <span class="pill r" id="pR">❌ 未回報 13</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <div style="font-size:12.5px;opacity:.9;margin-top:6px" id="cloudStat"></div>
  </div>

  <div class="paste">
    <b>📥 貼上店長的回報訊息</b>
    <div class="hint">到 Teams 把店長回報的訊息複製過來(一次貼多間、多則都可以;同一間門市重複回報,以「回報時間」最新的為準)</div>
    <textarea id="inbox" placeholder="把回報訊息貼在這裡…&#10;🌀【防颱檢查回報】&#10;門市:光華|店長:王小明&#10;整體進度:23/23(100%)…"></textarea>
    <div class="btnrow">
      <button class="btn btn-blue" id="pullBtn" onclick="pull(true)" style="display:none">☁️ 立即更新</button>
      <button class="btn btn-blue" onclick="ingest()">解析加入</button>
      <button class="btn btn-green" onclick="copySummary()">📋 複製彙整摘要</button>
      <button class="btn btn-gray" onclick="clearAll()">清空重來</button>
    </div>
  </div>

  <div class="board" id="board"></div>
  <div class="unknown" id="unknown" style="display:none"></div>

  <div class="note">點任一門市可展開未完成明細・資料只存在你這台電腦的瀏覽器</div>
</div>
<div class="toast" id="toast"></div>

<script>
var STORES = ["師大","光華","士林","板橋","中壢","新竹","宜蘭","文心","英才","嘉義","台南","建國","左營"];
var KEY = "typhoon_admin_2026_v1";
var db = { reports: {}, unknown: [] };   // reports[store] = {mgr, done, total, pct, time, ts, secs:[], undone:[]}

function load() {
  try { var r = localStorage.getItem(KEY); if (r) db = JSON.parse(r); } catch (e) {}
  if (!db || typeof db !== "object") db = {};
  if (!db.reports) db.reports = {};
  if (!db.unknown) db.unknown = [];
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(db)); } catch (e) {}
}

function parseTime(str) {
  // "7/9 18:02" -> timestamp (今年)
  var m = /(\d{1,2})\/(\d{1,2})\s+(\d{1,2}):(\d{2})/.exec(str || "");
  if (!m) return Date.now();
  var now = new Date();
  return new Date(now.getFullYear(), +m[1] - 1, +m[2], +m[3], +m[4]).getTime();
}

function parseReports(text) {
  var out = [];
  var blocks = text.split(/(?=【防颱檢查回報】)/);
  blocks.forEach(function (b) {
    if (b.indexOf("【防颱檢查回報】") === -1) return;
    var store = (/門市[::]\s*([^|｜\n]+)/.exec(b) || [])[1];
    if (!store) return;
    store = store.trim();
    var mgr = ((/店長[::]\s*([^\n]+)/.exec(b) || [])[1] || "").trim();
    var pm = /整體進度[::]\s*(\d+)\s*\/\s*(\d+)/.exec(b);
    var done = pm ? +pm[1] : 0, total = pm ? +pm[2] : 0;
    var timeStr = ((/回報時間[::]\s*([^\n]+)/.exec(b) || [])[1] || "").trim();
    var secs = [], undone = [];
    b.split("\n").forEach(function (ln) {
      ln = ln.trim();
      if (/^[✅⏳]/.test(ln)) secs.push(ln);
      if (/^[　\s]*▢/.test(ln)) undone.push(ln.replace(/^[　\s]*▢\s*/, ""));
    });
    out.push({
      store: store, mgr: mgr, done: done, total: total,
      pct: total ? Math.round(done / total * 100) : 0,
      time: timeStr, ts: parseTime(timeStr), secs: secs, undone: undone
    });
  });
  return out;
}

function ingest() {
  var txt = document.getElementById("inbox").value;
  if (!txt.trim()) { toast("先把回報訊息貼進來"); return; }
  var list = parseReports(txt);
  if (!list.length) { toast("沒認出回報格式,確認是從清單頁複製的訊息"); return; }
  var added = 0, skippedOld = 0, unknown = 0;
  list.forEach(function (r) {
    if (STORES.indexOf(r.store) === -1) {
      db.unknown.push(r.store + "(" + r.time + ")");
      unknown++;
      return;
    }
    var old = db.reports[r.store];
    if (old && old.ts > r.ts) { skippedOld++; return; }
    db.reports[r.store] = r;
    added++;
  });
  save();
  document.getElementById("inbox").value = "";
  render();
  var msg = "已更新 " + added + " 間";
  if (skippedOld) msg += "・略過 " + skippedOld + " 則較舊回報";
  if (unknown) msg += "・" + unknown + " 則門市名稱無法辨識";
  toast(msg);
}

function statusOf(r) {
  if (!r) return "r";
  return (r.total && r.done === r.total) ? "g" : "y";
}

function render() {
  var g = 0, y = 0, r = 0;
  var html = "";
  STORES.forEach(function (s) {
    var rep = db.reports[s];
    var st = statusOf(rep);
    if (!rep) r++; else if (st === "g") g++; else y++;
    var chip = rep ? (st === "g" ? "✅ 完成" : "⏳ " + rep.pct + "%") : "❌ 未回報";
    var barColor = st === "g" ? "#10b981" : "#f59e0b";
    var pct = rep ? rep.pct : 0;
    var meta = rep ? ((rep.mgr ? rep.mgr + "・" : "") + rep.time) : "—";
    var det = "";
    if (rep) {
      rep.secs.forEach(function (sec) {
        det += '<div class="' + (sec.charAt(0) === "✅" ? "ok" : "ud") + '">' + esc(sec) + '</div>';
      });
      if (rep.undone.length) {
        det += '<div style="margin-top:6px;font-weight:700">未完成項目:</div>';
        rep.undone.forEach(function (u) { det += '<div class="ud">▢ ' + esc(u) + '</div>'; });
      }
    } else {
      det = '<div class="ud">尚未收到這間門市的回報</div>';
    }
    html += '<div class="row" onclick="this.classList.toggle(\'open\')">'
      + '<div class="row-head">'
      + '<span class="st-name">' + s + '</span>'
      + '<span class="chip ' + st + '">' + chip + '</span>'
      + '<span class="mini"><i style="width:' + pct + '%;background:' + barColor + '"></i></span>'
      + '<span class="meta">' + esc(meta) + '</span>'
      + '</div><div class="det">' + det + '</div></div>';
  });
  document.getElementById("board").innerHTML = html;

  document.getElementById("pG").textContent = "✅ 完成 " + g;
  document.getElementById("pY").textContent = "⏳ 進行中 " + y;
  document.getElementById("pR").textContent = "❌ 未回報 " + r;
  document.getElementById("barFill").style.width = Math.round(g / STORES.length * 100) + "%";

  var un = document.getElementById("unknown");
  if (db.unknown.length) {
    un.style.display = "block";
    un.innerHTML = "⚠️ 無法辨識的門市名稱(請確認店長選對門市):" + esc(db.unknown.join("、"));
  } else { un.style.display = "none"; }
}

function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function copySummary() {
  var gArr = [], yArr = [], rArr = [];
  STORES.forEach(function (s) {
    var rep = db.reports[s];
    if (!rep) rArr.push(s);
    else if (rep.total && rep.done === rep.total) gArr.push(s);
    else yArr.push(s + "(" + rep.pct + "%)");
  });
  var now = new Date();
  var pad = function (n) { return (n < 10 ? "0" : "") + n; };
  var lines = [];
  lines.push("🌀 防颱回報彙整|" + (now.getMonth() + 1) + "/" + now.getDate() + " " + pad(now.getHours()) + ":" + pad(now.getMinutes()));
  lines.push("✅ 完成 " + gArr.length + "/13" + (gArr.length ? ":" + gArr.join("、") : ""));
  lines.push("⏳ 進行中 " + yArr.length + (yArr.length ? ":" + yArr.join("、") : ""));
  lines.push("❌ 未回報 " + rArr.length + (rArr.length ? ":" + rArr.join("、") : ""));
  copyText(lines.join("\n"), "彙整摘要已複製");
}

function copyText(txt, okMsg) {
  var done = function () { toast(okMsg); };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(done, function () { legacyCopy(txt); done(); });
  } else { legacyCopy(txt); done(); }
}
function legacyCopy(txt) {
  var ta = document.createElement("textarea");
  ta.value = txt; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
}

function clearAll() {
  if (confirm("確定要清空所有已彙整的回報?(通常在下一次颱風前才需要)")) {
    db = { reports: {}, unknown: [] };
    save();
    render();
  }
}

var toastTimer;
function toast(msg) {
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function () { t.classList.remove("show"); }, 2600);
}

/* ===== 自動同步(kvdb.io)===== */
var SYNC_BASE = "https://kvdb.io/";
var SYNC_B = "";
try { SYNC_B = new URLSearchParams(location.search).get("b") || ""; } catch (e) {}

function normalizeList(j) {
  // 兼容 kvdb 可能的三種回傳格式:[[k,v]...] / [{key,value}...] / {k:v}
  var out = [];
  if (Array.isArray(j)) {
    j.forEach(function (e) {
      if (Array.isArray(e) && e.length >= 2) out.push([e[0], e[1]]);
      else if (e && typeof e === "object" && e.key !== undefined) out.push([e.key, e.value]);
    });
  } else if (j && typeof j === "object") {
    Object.keys(j).forEach(function (k) { out.push([k, j[k]]); });
  }
  return out;
}

function mergeRemote(pairs) {
  var updated = 0;
  pairs.forEach(function (p) {
    var k = String(p[0]);
    try { k = decodeURIComponent(k); } catch (e) {}
    if (k.indexOf("fangtai_") !== 0) return;
    var v = p[1];
    var r = null;
    try { r = (typeof v === "string") ? JSON.parse(v) : v; } catch (e) { return; }
    if (!r || !r.store) r = r || {};
    if (!r.store) r.store = k.slice(8);
    r.store = String(r.store).trim();
    if (!r.ts) r.ts = 0;
    if (!r.secs) r.secs = [];
    if (!r.undone) r.undone = [];
    r.pct = r.total ? Math.round(r.done / r.total * 100) : (r.pct || 0);
    if (STORES.indexOf(r.store) === -1) {
      var tag = r.store + "(" + (r.time || "?") + ")";
      if (db.unknown.indexOf(tag) === -1) db.unknown.push(tag);
      return;
    }
    var old = db.reports[r.store];
    if (old && old.ts >= r.ts) return;
    db.reports[r.store] = r;
    updated++;
  });
  return updated;
}

var pulling = false;
function pull(manual) {
  if (!SYNC_B || typeof fetch === "undefined" || pulling) return;
  pulling = true;
  setCloud("🟡 更新中…");
  fetch(SYNC_BASE + SYNC_B + "/?values=true&format=json")
    .then(function (r) {
      if (r.status === 404) return [];   // 尚無任何回報
      if (!r.ok) throw 0;
      return r.json();
    })
    .then(function (j) {
      var n = mergeRemote(normalizeList(j));
      save();
      render();
      var now = new Date();
      var pad = function (x) { return (x < 10 ? "0" : "") + x; };
      setCloud("🟢 自動同步中(每 25 秒)・最後更新 " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds()));
      if (manual) toast(n ? "已更新 " + n + " 間門市" : "沒有新的回報");
    })
    .catch(function () {
      setCloud("🔴 同步失敗,稍後自動重試(也可用下方貼訊息的備用方式)");
    })
    .then(function () { pulling = false; });
}
function setCloud(msg) {
  var el = document.getElementById("cloudStat");
  if (el) el.textContent = msg;
}

load();
render();
if (SYNC_B) {
  document.getElementById("pullBtn").style.display = "";
  pull(false);
  setInterval(function () { pull(false); }, 25000);
} else {
  setCloud("⚪ 手動模式:用下方貼訊息彙整。要自動同步,請用 setup 頁產生的「彙整版連結」開啟本頁");
}
</script>
</body>
</html>
